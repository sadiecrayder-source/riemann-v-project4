<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Riemann-V | Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --pink: #ff007f; --bg: #0a0508; }
        body { background: var(--bg); color: white; font-family: 'Inter'; margin: 0; }
        nav { background: #1a0d14; padding: 1rem 5%; display: flex; justify-content: space-between; border-bottom: 2px solid var(--pink); position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; margin-left: 20px; opacity: 0.6; font-weight: bold; }
        .container { padding: 40px; display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .controls { background: #1a0d14; padding: 25px; border-radius: 20px; border: 1px solid var(--pink); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--pink); color: white; box-sizing: border-box; }
        #dataTable { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.8rem; }
        #dataTable th, #dataTable td { border: 1px solid #333; padding: 8px; text-align: center; }
        #dataTable th { color: var(--pink); }
        canvas { max-height: 400px; }
    </style>
</head>
<body>
    <nav>
        <div style="font-family:'Orbitron'; color:var(--pink)">RIEMANN-V</div>
        <div>
            <a href="index.html">HOME</a>
            <a href="lecture.html">LECTURE</a>
            <a href="visualizer.html" style="color:var(--pink); opacity:1">SIMULATOR</a>
            <a href="archives.html">ARCHIVES</a>
            <a href="audit.html">VERIFY</a>
        </div>
    </nav>
    <div class="container">
        <div class="controls">
            <label>Function f(x):</label>
            <input type="text" id="func" value="x^2">
            <label>Partitions (n):</label>
            <input type="range" id="n" min="2" max="20" value="5">
            <label>Logic:</label>
            <select id="type">
                <option value="left">Left</option>
                <option value="mid">Midpoint</option>
                <option value="right">Right</option>
            </select>
            <h2 id="areaDisplay" style="color:var(--pink)">Area: 0.00</h2>
            <div style="max-height: 300px; overflow-y: auto;">
                <table id="dataTable">
                    <thead><tr><th>Interval</th><th>Height</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
        <div style="background:#0d1117; padding:20px; border-radius:20px;">
            <canvas id="mainChart"></canvas>
        </div>
    </div>
    <script>
        let chart;
        function draw() {
            const exp = document.getElementById('func').value;
            const n = parseInt(document.getElementById('n').value);
            const type = document.getElementById('type').value;
            const a=0, b=4, dx=(b-a)/n;
            let area=0, labels=[], curve=[], rects=[], tableHTML="";
            
            for(let x=a; x<=b; x+=0.1) {
                labels.push(x.toFixed(1));
                try { curve.push(math.evaluate(exp,{x})); } catch(e) { curve.push(0); }
            }

            for(let i=0; i<n; i++) {
                let xv = (type==='left')?a+i*dx:(type==='right')?a+(i+1)*dx:a+(i+0.5)*dx;
                let h = 0; try { h = math.evaluate(exp,{x:xv}); } catch(e) {}
                area += h*dx;
                rects.push({x: a+i*dx, y:h});
                tableHTML += `<tr><td>${(a+i*dx).toFixed(1)}-${(a+(i+1)*dx).toFixed(1)}</td><td>${h.toFixed(2)}</td></tr>`;
            }

            document.getElementById('areaDisplay').innerText = "Area: " + area.toFixed(3);
            document.getElementById('tableBody').innerHTML = tableHTML;

            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ data: curve, borderColor: '#ff007f', pointRadius: 0 },
                    { type: 'bar', data: labels.map(l => {
                        let x = parseFloat(l);
                        let bin = Math.floor((x-a)/dx);
                        return rects[bin] ? rects[bin].y : 0;
                    }), backgroundColor: 'rgba(255,0,127,0.3)', barPercentage: 1, categoryPercentage: 1 }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }
        document.getElementById('n').oninput = draw;
        document.getElementById('func').oninput = draw;
        document.getElementById('type').onchange = draw;
        draw();
    </script>
</body>
</html>
